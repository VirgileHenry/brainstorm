<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>Boseiju</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <header class="site-header">
            <h1>Boseiju</h1>
            <p class="subtitle">
                An experimental Magic: The Gathering oracle text parser. Type a
                card name and oracle text to inspect preprocessing output.
            </p>
        </header>

        <main class="layout">
            <h3>Card name</h3>
            <input
                id="card_name_input"
                type="text"
                placeholder="Card name..."
            />

            <h3>Oracle text</h3>
            <textarea
                id="oracle_text_input"
                placeholder="Oracle text..."
                rows="4"
            ></textarea>

            <section class="output">
                <h3>Parsed oracle text</h3>
                <div id="token_grid" class="token-grid"></div>
            </section>
        </main>

        <script src="scripts/boseiju_wasm.js"></script>
    </body>
</html>
